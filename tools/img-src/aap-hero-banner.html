<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1600px; height: 600px; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #f4efe6;
    background-image: radial-gradient(#e1d9c8 1.6px, transparent 1.6px);
    background-size: 56px 56px;
    color: #26231c;
    position: relative;
  }
  .left {
    position: absolute;
    left: 90px;
    top: 124px;
    width: 760px;
  }
  h1 {
    font-size: 64px;
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.08;
    color: #26231c;
  }
  .subtitle {
    margin-top: 18px;
    font-size: 28px;
    color: #6f665a;
    font-weight: 500;
  }
  .pills {
    margin-top: 34px;
    display: flex;
    gap: 16px;
  }
  .pill {
    border-radius: 999px;
    padding: 12px 26px;
    font-size: 22px;
    font-weight: 600;
    background: #dcebe7;
    color: #0a463f;
    box-shadow: 0 6px 16px rgba(38,35,28,.06);
    white-space: nowrap;
  }
  .pill.mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    background: #efe9dd;
    color: #4a4338;
  }
  .pill.bronze {
    background: #f1e4d0;
    color: #bd7b34;
  }
  .tagline {
    position: absolute;
    left: 90px;
    bottom: 54px;
    font-size: 23px;
    color: #9c9486;
    font-weight: 500;
    letter-spacing: .2px;
  }
  /* Right composition */
  .scene {
    position: absolute;
    right: 90px;
    top: 0;
    width: 700px;
    height: 600px;
  }
  .dealer-card {
    position: absolute;
    right: 0;
    top: 112px;
    width: 304px;
    background: linear-gradient(160deg, #0e5a52, #0a463f);
    border-radius: 24px;
    box-shadow: 0 16px 36px rgba(14,90,82,.28);
    padding: 30px 30px 28px;
    color: #ffffff;
  }
  .dealer-card .emoji { font-size: 52px; line-height: 1; }
  .dealer-card .name {
    margin-top: 16px;
    font-size: 26px;
    font-weight: 700;
  }
  .dealer-card .meta {
    margin-top: 8px;
    font-size: 19px;
    color: #cfe4df;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .agent-chip {
    position: absolute;
    left: 0;
    top: 360px;
    display: flex;
    align-items: center;
    gap: 14px;
    background: #fbf9f4;
    border-radius: 999px;
    padding: 16px 30px 16px 20px;
    box-shadow: 0 16px 36px rgba(38,35,28,.09);
    border: 1px solid #ece4d3;
  }
  .agent-chip .emoji { font-size: 38px; line-height: 1; }
  .agent-chip .label { font-size: 24px; font-weight: 700; color: #26231c; white-space: nowrap; }
  /* Connector line from agent chip to dealer card */
  .connector {
    position: absolute;
    left: 252px;
    top: 398px;
    width: 196px;
    height: 0;
    border-top: 3px dashed #0e5a52;
    transform: rotate(-33.5deg);
    transform-origin: left center;
  }
  .connector .dot-a, .connector .dot-b {
    position: absolute;
    top: -7px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #0e5a52;
  }
  .connector .dot-a { left: -4px; }
  .connector .dot-b { right: -4px; }
  .send-label {
    position: absolute;
    left: 334px;
    top: 344px;
    transform: translate(-50%, -50%);
    background: #dcebe7;
    color: #0a463f;
    border-radius: 999px;
    padding: 8px 20px;
    font-size: 20px;
    font-weight: 700;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    box-shadow: 0 6px 16px rgba(14,90,82,.15);
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="left">
    <h1>Auto Agent Protocol</h1>
    <div class="subtitle">the A2A automotive-retail profile &middot; JSON-RPC only</div>
    <div class="pills">
      <div class="pill">v1.1</div>
      <div class="pill mono">SendMessage</div>
      <div class="pill bronze">five typed skills</div>
    </div>
  </div>

  <div class="tagline">open standard&nbsp;&nbsp;&middot;&nbsp;&nbsp;typed messages&nbsp;&nbsp;&middot;&nbsp;&nbsp;consented leads</div>

  <div class="scene">
    <div class="agent-chip">
      <span class="emoji">&#129302;</span>
      <span class="label">Buyer agent</span>
    </div>
    <div class="connector">
      <span class="dot-a"></span>
      <span class="dot-b"></span>
    </div>
    <div class="send-label">SendMessage</div>
    <div class="dealer-card">
      <div class="emoji">&#127980;</div>
      <div class="name">Dealership agent</div>
      <div class="meta">agent-card.json</div>
    </div>
  </div>
</body>
</html>
