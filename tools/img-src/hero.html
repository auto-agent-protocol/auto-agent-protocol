<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1600px; height: 900px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background-color: #eef1f7;
    background-image: radial-gradient(#d4dae6 1.6px, transparent 1.6px);
    background-size: 56px 56px;
    color: #0f1d33;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }
  .tag {
    margin-top: 84px;
    background: #dbe7fb;
    color: #1d4ed8;
    font-weight: 600;
    font-size: 21px;
    padding: 11px 28px;
    border-radius: 999px;
    letter-spacing: .04em;
  }
  h1 {
    margin-top: 32px;
    font-size: 64px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .sub {
    margin-top: 18px;
    font-size: 28px;
    color: #5b6b84;
  }
  .diagram {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    padding: 0 110px 64px;
  }
  .card {
    position: relative;
    z-index: 2;
    width: 330px;
    border-radius: 26px;
    padding: 44px 20px;
    text-align: center;
  }
  .card.white { background: #fff; box-shadow: 0 14px 32px rgba(15,29,51,.08); }
  .card.blue {
    background: linear-gradient(160deg, #2563eb, #1d4ed8);
    color: #fff;
    box-shadow: 0 14px 32px rgba(37,99,235,.25);
  }
  .emoji { font-size: 78px; line-height: 1; }
  .card .name { margin-top: 22px; font-size: 31px; font-weight: 700; }
  .card .role {
    margin-top: 10px;
    font-size: 22px;
    color: #5b6b84;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .card.blue .role { color: #c9dafc; }
  .link { flex: 1; position: relative; height: 270px; z-index: 1; }
  .line {
    position: absolute;
    left: -28px;
    right: -28px;
    top: 50%;
    height: 10px;
    transform: translateY(-50%);
    background: linear-gradient(90deg, #2563eb, #1d4ed8);
    border-radius: 999px;
  }
  .msg {
    position: absolute;
    transform: translate(-50%, -50%);
    display: flex;
    align-items: center;
    gap: 13px;
    background: #fff;
    border: 2px solid #dbe7fb;
    border-radius: 999px;
    padding: 13px 26px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 23px;
    font-weight: 600;
    color: #41506b;
    box-shadow: 0 14px 32px rgba(15,29,51,.08);
    white-space: nowrap;
    z-index: 3;
  }
  .msg .dot { width: 12px; height: 12px; border-radius: 50%; background: #2563eb; flex: none; }
  .m1 { left: 25%; top: 22%; }
  .m2 { left: 50%; top: 50%; }
  .m3 { left: 73%; top: 78%; }
</style>
</head>
<body>
  <div class="tag">A2A AUTOMOTIVE RETAIL EXTENSION · v1.0</div>
  <h1>AI agents, meet the dealership</h1>
  <div class="sub">Typed automotive commerce over A2A v1.0</div>

  <div class="diagram">
    <div class="card white">
      <div class="emoji">&#129302;</div>
      <div class="name">Buyer Agent</div>
      <div class="role">A2A client</div>
    </div>

    <div class="link">
      <div class="line"></div>
      <div class="msg m1"><span class="dot"></span>inventory.search</div>
      <div class="msg m2"><span class="dot"></span>inventory.vehicle</div>
      <div class="msg m3"><span class="dot"></span>lead.submit</div>
    </div>

    <div class="card blue">
      <div class="emoji">&#127980;</div>
      <div class="name">Dealership</div>
      <div class="role">A2A server</div>
    </div>
  </div>
</body>
</html>
